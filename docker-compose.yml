services:
  node1:
    image: mc714-trabalho-2-node:latest
    build: .
    environment:
      NODE_ID: "1"
      PEERS: "2=http://node2:8000,3=http://node3:8000"
      RESOURCE_URL: "http://resource:8000"
      HEARTBEAT_INTERVAL_MS: "700"
      LEADER_TIMEOUT_MS: "2500"
      ELECTION_RESPONSE_TIMEOUT_MS: "700"
      COORDINATOR_TIMEOUT_MS: "2500"
      STARTUP_ELECTION_DELAY_MS: "500"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 5

  node2:
    image: mc714-trabalho-2-node:latest
    environment:
      NODE_ID: "2"
      PEERS: "1=http://node1:8000,3=http://node3:8000"
      RESOURCE_URL: "http://resource:8000"
      HEARTBEAT_INTERVAL_MS: "700"
      LEADER_TIMEOUT_MS: "2500"
      ELECTION_RESPONSE_TIMEOUT_MS: "700"
      COORDINATOR_TIMEOUT_MS: "2500"
      STARTUP_ELECTION_DELAY_MS: "500"
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 5

  node3:
    image: mc714-trabalho-2-node:latest
    environment:
      NODE_ID: "3"
      PEERS: "1=http://node1:8000,2=http://node2:8000"
      RESOURCE_URL: "http://resource:8000"
      HEARTBEAT_INTERVAL_MS: "700"
      LEADER_TIMEOUT_MS: "2500"
      ELECTION_RESPONSE_TIMEOUT_MS: "700"
      COORDINATOR_TIMEOUT_MS: "2500"
      STARTUP_ELECTION_DELAY_MS: "500"
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 5

  resource:
    image: mc714-trabalho-2-node:latest
    command: ["uvicorn", "resource.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 5
